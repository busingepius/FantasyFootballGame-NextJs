version: '3.8'

services:
  app:
    build:
      context: .
      target: base
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    restart: always
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongo:27017/fantasyfootball
    depends_on:
      - mongo

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data: